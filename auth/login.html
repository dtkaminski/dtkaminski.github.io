<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log in — greta</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;550;600;650;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./auth.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
</head>
<body>
<div class="auth-wrap">
  <a href="/" class="brand">
    <div class="brand-mark"><svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg" aria-label="Greta"><defs><linearGradient id="apb" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#8B5CF6"/><stop offset="1" stop-color="#38BDF8"/></linearGradient><linearGradient id="agm" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#22D3A6"/><stop offset="1" stop-color="#5DE5C8"/></linearGradient></defs><rect x="49" y="30" width="138" height="41" rx="20.5" transform="rotate(-45 118 50.5)" fill="url(#apb)"/><rect x="71" y="177" width="138" height="41" rx="20.5" transform="rotate(-45 140 197.5)" fill="url(#agm)"/><circle cx="97" cy="132" r="24" fill="#0B132B"/></svg></div>
    <div class="brand-name">greta</div>
  </a>

  <div class="auth-card">
    <div id="form-state">
      <h1>Log in</h1>
      <p class="lead">Enter your email — we'll send you a magic link. No passwords. Sessions last 7 days.</p>

      <form id="login-form">
        <label>Email
          <input type="email" name="email" autocomplete="email" required placeholder="founder@yourbrand.com" autofocus/>
        </label>

        <button type="submit" class="btn-primary" id="submit-btn">
          <span class="btn-label">Send magic link</span>
        </button>

        <div id="error-box" class="error-box" hidden></div>

        <p class="fine-print">
          New here? <a href="./signup.html">Create a workspace →</a>
        </p>
      </form>
    </div>

    <div id="success-state" hidden>
      <div class="success-icon">✓</div>
      <h1>Check your email</h1>
      <p class="lead">We sent a sign-in link to <b id="success-email"></b>. Click it to log in.</p>
      <p class="fine-print">Didn't arrive in 60 seconds? <a href="#" id="resend-link">Resend</a> · check spam · or <a href="mailto:hello@operatorintelligence.com">contact support</a>.</p>
    </div>
  </div>

  <p class="auth-footer">
    <a href="/">← Back to home</a>
  </p>
</div>

<script>
  const SUPABASE_URL = 'https://awcncqvsnuhqyihpdgcx.supabase.co';
  const SUPABASE_PUBLISHABLE_KEY = 'sb_publishable_6NLIq1JL_LZIMjez3FmnVQ_JIVw3-A2';
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY);

  const form = document.getElementById('login-form');
  const submitBtn = document.getElementById('submit-btn');
  const errorBox = document.getElementById('error-box');
  const formState = document.getElementById('form-state');
  const successState = document.getElementById('success-state');

  // If we already have a session, skip straight to workspace
  (async () => {
    const { data } = await sb.auth.getSession();
    if (data?.session) {
      window.location.replace('./workspace.html');
    }
  })();

  async function sendMagicLink(email) {
    return await sb.auth.signInWithOtp({
      email,
      options: {
        emailRedirectTo: window.location.origin + window.location.pathname.replace('/login.html', '/workspace.html'),
      },
    });
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorBox.hidden = true;
    submitBtn.disabled = true;
    submitBtn.querySelector('.btn-label').textContent = 'Sending…';

    const email = form.email.value.trim().toLowerCase();
    const { error } = await sendMagicLink(email);

    if (error) {
      errorBox.textContent = error.message || 'Could not send link. Try again.';
      errorBox.hidden = false;
      submitBtn.disabled = false;
      submitBtn.querySelector('.btn-label').textContent = 'Send magic link';
      return;
    }

    document.getElementById('success-email').textContent = email;
    formState.hidden = true;
    successState.hidden = false;

    // Wire up resend
    document.getElementById('resend-link').addEventListener('click', async (e) => {
      e.preventDefault();
      await sendMagicLink(email);
      e.target.textContent = 'Resent ✓';
    });
  });
</script>
</body>
</html>
